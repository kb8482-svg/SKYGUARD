services:
  nginx_proxy:
    ports: !override
      - "80:80"
      - "443:443"
    volumes: !override
      - ./api-gateway/nginx-production.conf:/etc/nginx/conf.d/nginx.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /dev/null:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  minio:
    ports: !reset []

  prometheus:
    ports: !reset []
