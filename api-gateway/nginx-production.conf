server {
    listen 80;
    listen [::]:80;
    server_name app.pejmoneglejmo.me;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.pejmoneglejmo.me;

    ssl_certificate /etc/letsencrypt/live/app.pejmoneglejmo.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.pejmoneglejmo.me/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;

    location / {
        proxy_pass http://frontend:3000/;
    }

    location /auth/ {
        proxy_pass http://user-service:5001/auth/;
    }

    location = /events {
        proxy_pass http://user-service:5001/events;
    }

    location /events/ {
        proxy_pass http://user-service:5001/events/;
    }

    location /weather/ {
        proxy_pass http://weather-service:5002/weather/;
    }

    location /storage/ {
        proxy_pass http://storage-service:5003/;
        client_max_body_size 50M;
    }

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
}
