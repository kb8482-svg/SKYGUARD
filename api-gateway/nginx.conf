events { worker_connections 1024; }

http {
    server {
        listen 8000;

        location /auth/ {
            proxy_pass http://user-service:5001/;
        }

        location /events/ {
            proxy_pass http://user-service:5001/events/;
        }

        location /weather/ {
            proxy_pass http://weather-service:5002/;
        }

        location /storage/ {
            proxy_pass http://storage-service:5003/;
        }
    }
}