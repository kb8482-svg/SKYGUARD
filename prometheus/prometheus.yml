global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  # Enable this later when your FastAPI app exposes /metrics
  - job_name: "items-app"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["host.docker.internal:8000"]