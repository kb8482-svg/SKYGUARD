version: "3.9"

services:

  postgres-db:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_USER: skyguard_user
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: skyguard_auth
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo-db:
    image: mongo:latest
    container_name: mongo-db
    volumes:
      - mongo_data:/data/db

  user-service:
    build: ./user-service
    container_name: user-service
    expose:
      - "5001"
    depends_on:
      - postgres-db

  weather-service:
    build: ./weather-service
    container_name: weather-service
    expose:
      - "5002"
    depends_on:
      - mongo-db

  storage-service:
    build: ./storage-service
    container_name: storage-service
    expose:
      - "5003"

  frontend:
    build: ./frontend
    container_name: frontend
    expose:
      - "3000"

  nginx_proxy:
    image: nginx:latest
    container_name: nginx_proxy
    ports:
      - "8000:80"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/conf.d/nginx.conf:ro
      - /dev/null:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - user-service
      - weather-service
      - storage-service

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: skyguard
      MINIO_ROOT_PASSWORD: skyguard123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  mongo_data:
  minio_data: