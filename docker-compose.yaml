version: '3.8'

services:
  api-gateway:
    image: nginx:alpine
    ports:
      - "8000:8000"
      - "80:80"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service
      - weather-service
      - storage-service
      
  user-service:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./user-service:/app
    command: sh -c "npm install && npm start"
    ports:
      - "5001:5001"

  weather-service:
    image: python:3.10-slim
    working_dir: /app
    volumes:
      - ./weather-service:/app
    command: sh -c "pip install fastapi uvicorn && uvicorn main:app --host 0.0.0.0 --port 5002"
    ports:
      - "5002:5002"

  storage-service:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./storage-service:/app
    command: sh -c "npm install && npm start"
    ports:
      - "5003:5003"